<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sabrina 40 歲生日倒數網站" />
    <title>Sabrina 40 倒數</title>
    <style>
      :root {
        --bg: #fff8f7;
        --bg-2: #fff1ee;
        --card: rgba(255, 255, 255, 0.76);
        --line: rgba(110, 70, 70, 0.12);
        --text: #3b2c2c;
        --muted: #8a6d6d;
        --accent: #e58c8c;
        --accent-2: #c96f93;
        --shadow: 0 18px 50px rgba(120, 84, 84, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(229, 140, 140, 0.22), transparent 28%),
          radial-gradient(circle at 85% 8%, rgba(201, 111, 147, 0.16), transparent 24%),
          linear-gradient(180deg, var(--bg), var(--bg-2));
      }
      .page {
        min-height: 100vh;
        max-width: 980px;
        margin: 0 auto;
        padding: 24px 18px 64px;
        display: grid;
        align-content: center;
        gap: 20px;
      }
      .hero, .note, .footer-card {
        background: var(--card);
        border: 1px solid rgba(255,255,255,0.7);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 28px;
      }
      .hero {
        padding: 28px 22px;
        text-align: center;
      }
      .eyebrow {
        color: var(--accent-2);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 12px;
        font-weight: 700;
      }
      h1 {
        margin: 14px 0 10px;
        font-size: clamp(34px, 9vw, 72px);
        line-height: 0.98;
        letter-spacing: -0.04em;
      }
      .lead {
        margin: 0 auto;
        max-width: 34rem;
        color: var(--muted);
        line-height: 1.8;
        font-size: 16px;
      }
      .countdown {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 24px;
      }
      .time-card {
        padding: 18px 12px;
        border-radius: 22px;
        background: rgba(255,255,255,0.78);
        border: 1px solid var(--line);
      }
      .time-value {
        font-size: clamp(28px, 8vw, 54px);
        font-weight: 800;
        letter-spacing: -0.04em;
      }
      .time-label {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
      }
      .target {
        margin-top: 22px;
        display: inline-flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }
      .chip {
        border-radius: 999px;
        padding: 10px 14px;
        background: rgba(229, 140, 140, 0.12);
        color: #a95959;
        font-weight: 700;
        font-size: 14px;
      }
      .note, .footer-card {
        padding: 18px 20px;
      }
      .note h2, .footer-card h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      .note p, .footer-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.8;
      }
      .done {
        margin-top: 20px;
        display: none;
        font-size: 20px;
        font-weight: 700;
        color: var(--accent-2);
      }
      @media (min-width: 760px) {
        .page { padding: 32px 24px 80px; }
        .countdown { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .hero { padding: 42px 34px; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="eyebrow">For Sabrina</div>
        <h1>距離恬恬 40 歲，<br />還有多久？</h1>
        <p class="lead">一個簡單、溫柔、每天都能打開看一下的小倒數。時間正在往 2026 年 5 月 18 日慢慢靠近。</p>

        <section class="countdown" aria-label="countdown timer">
          <article class="time-card">
            <div class="time-value" id="days">0</div>
            <div class="time-label">天</div>
          </article>
          <article class="time-card">
            <div class="time-value" id="hours">0</div>
            <div class="time-label">小時</div>
          </article>
          <article class="time-card">
            <div class="time-value" id="minutes">0</div>
            <div class="time-label">分鐘</div>
          </article>
          <article class="time-card">
            <div class="time-value" id="seconds">0</div>
            <div class="time-label">秒</div>
          </article>
        </section>

        <div class="target">
          <span class="chip">生日：1986/05/18</span>
          <span class="chip">40 歲：2026/05/18 00:00 GMT+8</span>
        </div>

        <div class="done" id="doneMessage">今天就是 Sabrina 的 40 歲生日了 ❤️</div>
      </section>

    </main>

    <script>
      const targetDate = new Date('2026-05-18T00:00:00+08:00').getTime();
      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');
      const doneEl = document.getElementById('doneMessage');

      function renderCountdown() {
        const now = Date.now();
        const diff = targetDate - now;

        if (diff <= 0) {
          daysEl.textContent = '0';
          hoursEl.textContent = '0';
          minutesEl.textContent = '0';
          secondsEl.textContent = '0';
          doneEl.style.display = 'block';
          return;
        }

        const day = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hour = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minute = Math.floor((diff / (1000 * 60)) % 60);
        const second = Math.floor((diff / 1000) % 60);

        daysEl.textContent = String(day);
        hoursEl.textContent = String(hour).padStart(2, '0');
        minutesEl.textContent = String(minute).padStart(2, '0');
        secondsEl.textContent = String(second).padStart(2, '0');
      }

      renderCountdown();
      setInterval(renderCountdown, 1000);
    </script>
  </body>
</html>
